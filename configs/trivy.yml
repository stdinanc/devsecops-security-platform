scan:
  skip-dirs:
    - .git
    - node_modules
    - dist
    - build
    - target
    - .venv
    - venv
    - vendor
    - security-platform

pkg:
  types:
    - os
    - library

secret:
  config: ""

misconfiguration:
  include-non-failures: false

license:
  full: true

# False positive yönetimi — .trivyignore varsa otomatik okunur, yoksa sorun çıkmaz